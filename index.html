<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE 1 | PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --p: #6c5ce7; --p-light: #efeeff; --bg: #f8f9fd; 
            --card: #ffffff; --text: #2d3436; --text-light: #636e72;
            --red: #ff4757; --green: #00b894; --border: #edf2f7; --off: #bdc3c7;
            --star: #f1c40f;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        #welcome-screen { position: fixed; inset: 0; background: #fff; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #mainAppContent { display: none; }

        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 10px 15px; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .btn-w { width: 40px; height: 40px; background: var(--p); color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; }
        .search-box { flex: 1; background: var(--p-light); border-radius: 12px; display: flex; align-items: center; padding: 0 12px; height: 40px; }
        .search-box input { border: none; background: none; outline: none; width: 100%; font-size: 14px; }

        .page { display: none; padding: 20px 15px; animation: slideUp 0.3s ease-out; min-height: 80vh; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 100px; text-align: center; color: var(--off); }
        .empty-state i { font-size: 80px; margin-bottom: 20px; opacity: 0.5; color: var(--p); }
        .empty-state h3 { color: var(--text); margin: 0; font-size: 18px; font-weight: 800; }
        .empty-state p { font-size: 15px; color: var(--p); margin-top: 8px; font-weight: bold; }

        .profile-card { background: var(--card); border-radius: 24px; padding: 25px; text-align: center; border: 1px solid var(--border); margin-bottom: 20px; }
        .avatar-box { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .status-dot { position: absolute; bottom: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid #fff; background: var(--green); }
        
        .verify-badge { color: var(--p); margin-right: 6px; font-size: 20px; display: none; position: relative; align-items: center; justify-content: center; }
        .verify-badge::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; color: white; font-size: 9px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .stats-row { display: flex; justify-content: center; gap: 20px; margin: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; }
        .stat-item { display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .stat-num { font-weight: 800; font-size: 16px; color: var(--text); }
        .stat-label { font-size: 11px; color: var(--text-light); }

        .rating-box { margin-top: 5px; cursor: pointer; }
        .stars { color: var(--off); font-size: 14px; margin-bottom: 2px; }
        .stars .active { color: var(--star); }
        .rating-info { font-size: 11px; color: var(--text-light); }

        .group-label { padding: 0 10px 10px; font-size: 12px; color: var(--text-light); font-weight: bold; }
        .settings-list { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        .s-item { display: flex; align-items: center; padding: 16px 18px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .s-item i { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--p-light); color: var(--p); border-radius: 10px; margin-left: 12px; font-size: 16px; }
        [dir="ltr"] .s-item i { margin-left: 0; margin-right: 12px; }
        .s-item span { flex: 1; font-size: 15px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-link { color: #b2bec3; font-size: 22px; cursor: pointer; position: relative; }
        .nav-link.active { color: var(--p); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); z-index: 50000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #fff; width: 100%; max-width: 400px; border-radius: 28px; padding: 25px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: var(--p); color: #fff; }
        
        .user-list-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; text-align: right; }
        .user-list-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .user-info { flex: 1; }
        .user-info h4 { margin: 0; font-size: 14px; }
        .user-info p { margin: 0; font-size: 11px; color: var(--text-light); }
        .friend-badge { font-size: 10px; color: #7f8c8d; display: flex; align-items: center; gap: 3px; font-weight: bold; margin-top: 2px; }
        .action-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
        .btn-follow { background: var(--p); color: #fff; }
        .btn-unfollow { background: #e0e0e0; color: #7f8c8d; }
        .btn-msg { background: var(--p-light); color: var(--p); margin-left: 5px; }
        .btn-followback { background: var(--p); color: #fff; }

        .pw-success-icon { font-size: 50px; color: var(--green); margin-bottom: 15px; }
        .spam-alert { background: #fff8eb; border: 1px solid #ffe5b3; color: #856404; padding: 15px; border-radius: 15px; font-size: 13px; line-height: 1.5; }
        .post-input-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); margin-top: 8px; outline: none; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2d3436; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 13px; z-index: 9999; display: none; }
        .lang-opt { padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .star-rating-input { font-size: 30px; color: var(--off); cursor: pointer; margin: 10px 5px; }
        .star-rating-input.selected { color: var(--star); }
        
        .username-status { font-size: 11px; margin-top: 5px; display: block; }
        .status-error { color: var(--red); }
        .status-success { color: var(--green); }

        .notif-badge { position: absolute; top: -5px; left: -5px; background: var(--red); color: #fff; font-size: 10px; min-width: 18px; height: 18px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; font-weight: bold; }
        .stat-notif { position: absolute; top: -8px; right: 0; background: var(--red); color: #fff; font-size: 9px; min-width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; }
        .new-tag { background: var(--red); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body id="bodyTag">

    <div id="welcome-screen">
        <h1 style="color:var(--p); font-size:35px;">ONE 1</h1>
        <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--p); font-size: 30px; margin-top: 20px;"></i>
    </div>

    <div id="mainAppContent">
        <header id="mainHeader">
            <div class="btn-w">W</div>
            <div class="search-box"><i class="fa fa-search"></i><input type="text" id="searchInput" placeholder="بحث..."></div>
        </header>

        <div id="home" class="page active">
            <div class="empty-state">
                <i class="fa-solid fa-feather-pointed"></i>
                <h3 id="txt-empty-home-h">لم يتم نشر شيء بعد!</h3>
                <p id="txt-empty-home-p">كن أول من ينشر!</p>
            </div>
        </div>

        <div id="chats" class="page">
            <div id="chatsList">
                <div class="empty-state">
                    <i class="fa-regular fa-comments"></i>
                    <h3 id="txt-empty-chat-h">لا توجد محادثات</h3>
                </div>
            </div>
        </div>

        <div id="profile" class="page">
            <div class="profile-card">
                <div class="avatar-box" onclick="document.getElementById('fInp').click()">
                    <img id="uImg" src="">
                    <div id="pDot" class="status-dot"></div>
                </div>
                <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
                    <h2 id="uName" style="margin:0">...</h2>
                    <i class="fa-solid fa-certificate verify-badge" id="vBadge"></i>
                </div>
                
                <div class="stats-row">
                    <div class="stat-item" onclick="openMyPostsModal()">
                        <span class="stat-num" id="count-posts">0</span>
                        <span class="stat-label" id="txt-posts">منشورات</span>
                    </div>
                    <div class="stat-item" onclick="openUsersModal('followers')">
                        <div id="followerNotif" class="stat-notif" style="display:none">0</div>
                        <span class="stat-num" id="count-followers">0</span>
                        <span class="stat-label" id="txt-followers">متابعون</span>
                    </div>
                    <div class="stat-item" onclick="openUsersModal('following')">
                        <span class="stat-num" id="count-following">0</span>
                        <span class="stat-label" id="txt-following">أتابعه</span>
                    </div>
                </div>

                <div class="rating-box" onclick="openRatingModal()">
                    <div class="stars" id="star-display">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    </div>
                    <div class="rating-info">
                        <span id="avg-rating">0.0</span> • <span id="rating-count">0</span> <span id="txt-raters">شخص قيمك</span>
                    </div>
                </div>
                <p id="uEmail" style="color:var(--text-light); font-size:13px; margin:10px 0 0;"></p>
                <input type="file" id="fInp" hidden onchange="upPhoto(this)">
            </div>

            <div class="group-label" id="label-acc">قسم الحساب</div>
            <div class="settings-list">
                <div class="s-item" onclick="openNameModal()"><i class="fa-regular fa-user"></i><span id="txt-change-name">تغيير الاسم المستعار</span></div>
                <div class="s-item" onclick="resetPassModern()"><i class="fa-solid fa-lock"></i><span id="txt-change-pass">تغيير كلمة المرور</span></div>
            </div>

            <div class="group-label" id="label-lang">قسم اللغة</div>
            <div class="settings-list">
                <div class="s-item" onclick="openLangModal()"><i class="fa-solid fa-globe"></i><span id="currentLangDisplay">العربية</span></div>
            </div>

            <div class="settings-list" style="margin-top:10px;">
                <div class="s-item" onclick="confirmAction('out')" style="color:var(--red)"><i class="fa-solid fa-sign-out-alt"></i><span id="txt-logout">تسجيل الخروج</span></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-link" onclick="tab('chats', this)"><i class="fa-regular fa-comment"></i></div>
            <div class="nav-link" onclick="tab('profile', this)">
                <div id="navNotif" class="notif-badge" style="display:none">0</div>
                <i class="fa-regular fa-user-circle"></i>
            </div>
        </nav>
    </div>

    <div id="overlay" class="modal-overlay"><div class="modal-box" id="modalBox"></div></div>
    <div id="toast" class="toast"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, query, where, getDocs, limit, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { 
            apiKey: "AIzaSyDj1jWQZHnELXe_eFkfGpi3F3_jPGhPm7I", 
            authDomain: "one1-95c0e.firebaseapp.com", 
            projectId: "one1-95c0e", 
            appId: "1:1090900617422:web:f6e9c11bb7a090c39ec89f" 
        };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;
        let currentLang = localStorage.getItem('lang') || 'ar';

        const translations = {
            ar: {
                search: "بحث...", acc: "قسم الحساب", lang: "قسم اللغة",
                cName: "تغيير الاسم المستعار", cPass: "تغيير كلمة المرور",
                logout: "تسجيل الخروج", save: "حفظ", cancel: "إلغاء", ok: "حسناً",
                outMsg: "هل تود تسجيل الخروج؟", sent: "تم إرسال الرابط بنجاح",
                spam: "ملاحظة: افحص مجلد الـ SPAM إذا لم تجد الرسالة.",
                posts: "منشورات", followers: "متابعون", following: "أتابعه", raters: "شخص قيمك",
                eHomeH: "لم يتم نشر شيء بعد!", eHomeP: "كن أول من ينشر!",
                statusOn: "حالتك الآن: متصل", statusOff: "حالتك الآن: مخفي",
                friends: "أصدقاء", followBack: "رد المتابعة", msg: "مراسلة",
                userTaken: "هذا اليوزر مستخدم بالفعل!", userFree: "اليوزر متاح ✅",
                followingText: "أتابعه", followBtn: "متابعة", newTag: "جديد"
            },
            en: {
                search: "Search...", acc: "Account", lang: "Language",
                cName: "Change Nickname", cPass: "Change Password",
                logout: "Logout", save: "Save", cancel: "Cancel", ok: "OK",
                outMsg: "Are you sure you want to logout?", sent: "Link sent successfully",
                spam: "Note: Check SPAM folder if you don't find it.",
                posts: "Posts", followers: "Followers", following: "Following", raters: "rated you",
                eHomeH: "Nothing posted yet!", eHomeP: "Be the first to post!",
                statusOn: "Status: Online", statusOff: "Status: Hidden",
                friends: "Friends", followBack: "Follow Back", msg: "Message",
                userTaken: "Username is taken!", userFree: "Username available ✅",
                followingText: "Following", followBtn: "Follow", newTag: "New"
            }
        };

        // دالة تحديث واجهة اللغة
        window.updateLanguageUI = () => {
            const lang = translations[currentLang];
            const isAr = currentLang === 'ar';
            document.getElementById('bodyTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('searchInput').placeholder = lang.search;
            document.getElementById('label-acc').innerText = lang.acc;
            document.getElementById('label-lang').innerText = lang.lang;
            document.getElementById('txt-change-name').innerText = lang.cName;
            document.getElementById('txt-change-pass').innerText = lang.cPass;
            document.getElementById('txt-logout').innerText = lang.logout;
            document.getElementById('txt-posts').innerText = lang.posts;
            document.getElementById('txt-followers').innerText = lang.followers;
            document.getElementById('txt-following').innerText = lang.following;
            document.getElementById('txt-raters').innerText = lang.raters;
            document.getElementById('currentLangDisplay').innerText = isAr ? 'العربية' : 'English';
        };

        // نظام مراقبة حالة تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (ds) => {
                    if (ds.exists()) {
                        currentUserData = { id: user.uid, ...ds.data() };
                        document.getElementById('uName').innerText = currentUserData.name || "مستخدم";
                        document.getElementById('uEmail').innerText = user.email;
                        document.getElementById('uImg').src = currentUserData.photo || `https://ui-avatars.com/api/?name=${currentUserData.name}`;
                        
                        document.getElementById('vBadge').style.display = currentUserData.isVerified ? 'flex' : 'none';
                        document.getElementById('count-posts').innerText = currentUserData.postsCount || 0;
                        document.getElementById('count-followers').innerText = (currentUserData.followers || []).length;
                        document.getElementById('count-following').innerText = (currentUserData.following || []).length;
                        
                        const newFollowers = (currentUserData.followers || []).filter(id => !(currentUserData.seenFollowers || []).includes(id)).length;
                        document.getElementById('navNotif').innerText = newFollowers;
                        document.getElementById('navNotif').style.display = newFollowers > 0 ? 'flex' : 'none';
                        document.getElementById('followerNotif').style.display = newFollowers > 0 ? 'flex' : 'none';

                        updateRatingUI(currentUserData.rating || {avg: 0, count: 0});
                        updateLanguageUI();
                        document.getElementById('welcome-screen').style.display = 'none';
                        document.getElementById('mainAppContent').style.display = 'block';
                    }
                });
            } else {
                window.location.replace("auth.html");
            }
        });

        window.showToast = (m) => {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };
        // دالة التنقل بين الصفحات
        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
        };

        window.closeModal = () => document.getElementById('overlay').style.display = 'none';

        // نظام البحث عن المستخدمين
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const v = e.target.value.trim().toLowerCase();
            const list = document.getElementById('chatsList');
            const lang = translations[currentLang];
            
            if (v.length < 1) {
                list.innerHTML = `<div class="empty-state"><i class="fa-regular fa-comments"></i><h3>${lang.eChatH}</h3></div>`;
                return;
            }

            const q = query(collection(db, "users"), where("name", "==", v), limit(5));
            const snap = await getDocs(q);
            let h = `<div style="padding:10px; font-weight:bold; color:var(--p)">نتائج البحث عن "${v}"</div>`;

            if (snap.empty) {
                list.innerHTML = `<div class="empty-state"><h3>لا توجد نتائج</h3></div>`;
                return;
            }

            snap.forEach(d => {
                const u = d.data();
                if (d.id === auth.currentUser.uid) return;
                const iFol = (currentUserData.following || []).includes(d.id);
                const folMe = (currentUserData.followers || []).includes(d.id);
                
                let btnTxt = iFol ? lang.followingText : (folMe ? lang.followBack : lang.followBtn);
                let btnCls = iFol ? 'btn-unfollow' : (folMe ? 'btn-followback' : 'btn-follow');

                h += `
                    <div class="user-list-item" style="background:#fff; margin-bottom:10px; border-radius:15px; padding:15px; border:1px solid var(--border);">
                        <img src="${u.photo || 'https://ui-avatars.com/api/?name='+u.name}">
                        <div class="user-info">
                            <h4>${u.name} ${u.isVerified ? '<i class="fa-solid fa-certificate" style="color:var(--p); font-size:12px"></i>' : ''}</h4>
                            <p style="font-size:10px; color:var(--text-light)">${iFol && folMe ? lang.friends : ''}</p>
                        </div>
                        <button class="action-btn ${btnCls}" onclick="toggleFollow('${d.id}', ${iFol})">${btnTxt}</button>
                    </div>`;
            });
            list.innerHTML = h;
            window.tab('chats', document.querySelectorAll('.nav-link')[1]);
        });

        // دالة المتابعة وإلغاء المتابعة
        window.toggleFollow = async (tid, is) => {
            const myRef = doc(db, "users", auth.currentUser.uid);
            const tRef = doc(db, "users", tid);
            try {
                if (is) {
                    await updateDoc(myRef, { following: arrayRemove(tid) });
                    await updateDoc(tRef, { followers: arrayRemove(auth.currentUser.uid) });
                } else {
                    await updateDoc(myRef, { following: arrayUnion(tid) });
                    await updateDoc(tRef, { followers: arrayUnion(auth.currentUser.uid) });
                }
                showToast(is ? "تم إلغاء المتابعة" : "تمت المتابعة");
            } catch (e) { showToast("خطأ في الشبكة"); }
        };

        // تغيير الاسم والتحقق من التوفر
        window.openNameModal = () => {
            const lang = translations[currentLang];
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('modalBox').innerHTML = `
                <h3>${lang.cName}</h3>
                <input id="nInp" class="post-input-box" style="text-align:center" value="${currentUserData.name}" oninput="checkName(this.value)">
                <span id="nStatus" class="username-status"></span>
                <div class="modal-btns">
                    <button id="nSave" class="btn btn-confirm" onclick="saveName()">${lang.save}</button>
                    <button class="btn" onclick="closeModal()">${lang.cancel}</button>
                </div>`;
        };

        window.checkName = async (v) => {
            const btn = document.getElementById('nSave');
            const st = document.getElementById('nStatus');
            const val = v.trim().toLowerCase();
            if (!val || val === currentUserData.name) { btn.disabled = false; st.innerText=""; return; }
            const q = query(collection(db, "users"), where("name", "==", val), limit(1));
            const s = await getDocs(q);
            if (!s.empty) { st.innerText = translations[currentLang].userTaken; st.className="username-status status-error"; btn.disabled = true; }
            else { st.innerText = translations[currentLang].userFree; st.className="username-status status-success"; btn.disabled = false; }
        };

        window.saveName = async () => {
            const n = document.getElementById('nInp').value.trim().toLowerCase();
            if (n) { await updateDoc(doc(db, "users", auth.currentUser.uid), { name: n }); closeModal(); showToast("تم التحديث"); }
        };

        // رفع الصورة
        window.upPhoto = (inp) => {
            if (inp.files[0]) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { photo: e.target.result });
                    showToast("تم تحديث الصورة ✅");
                };
                r.readAsDataURL(inp.files[0]);
            }
        };

        // نظام التقييم
        function updateRatingUI(r) {
            const avg = r.avg || 0;
            document.getElementById('avg-rating').innerText = avg.toFixed(1);
            document.getElementById('rating-count').innerText = r.count || 0;
            const stars = document.getElementById('star-display').children;
            for(let i=0; i<5; i++) stars[i].className = (i < Math.round(avg)) ? "fa-solid fa-star active" : "fa-solid fa-star";
        }

        window.openRatingModal = () => {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('modalBox').innerHTML = `
                <h3>${translations[currentLang].rateTitle || 'تقييم الحساب'}</h3>
                <div id="starContainer">${[1,2,3,4,5].map(v => `<i class="fa-solid fa-star star-rating-input" onclick="setR(${v})"></i>`).join('')}</div>
                <div class="modal-btns"><button class="btn btn-confirm" onclick="saveR()">حفظ</button><button class="btn" onclick="closeModal()">إلغاء</button></div>`;
        };

        let tempR = 0;
        window.setR = (v) => { tempR = v; document.querySelectorAll('.star-rating-input').forEach((s, i) => s.classList.toggle('selected', i < v)); };
        window.saveR = async () => {
            if(tempR === 0) return closeModal();
            const r = currentUserData.rating || {total:0, count:0};
            const nt = r.total + tempR; const nc = r.count + 1;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { rating: { total: nt, count: nc, avg: nt/nc } });
            closeModal(); showToast("شكراً لتقييمك!");
        };

        // اللغة والخروج
        window.openLangModal = () => {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('modalBox').innerHTML = `
                <h3>Choose Language / اختر اللغة</h3>
                <div class="lang-opt" onclick="setL('ar')"><span>العربية</span></div>
                <div class="lang-opt" onclick="setL('en')"><span>English</span></div>`;
        };
        window.setL = (l) => { localStorage.setItem('lang', l); location.reload(); };

        window.confirmAction = (t) => {
            if(t==='out') {
                if(confirm(translations[currentLang].outMsg)) { signOut(auth).then(() => location.replace("auth.html")); }
            }
        };

        window.resetPassModern = async () => {
            await sendPasswordResetEmail(auth, auth.currentUser.email);
            showToast(translations[currentLang].sent);
        };
    </script>
</body>
</html>
